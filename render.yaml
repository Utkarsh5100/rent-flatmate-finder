services:
  - type: web
    name: rent-flatmate-finder-backend
    runtime: node
    repo: https://github.com/anumodit740/rent-flatmate-finder.git
    branch: main
    rootDir: backend
    plan: free
    buildCommand: npm ci && npx prisma generate && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_VERSION
        value: 22.13.0
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: rent-flatmate-finder-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: FRONTEND_URL
        fromService:
          type: web
          name: rent-flatmate-finder-frontend
          envVarKey: RENDER_EXTERNAL_URL
      - key: LLM_PROVIDER
        value: openai
      - key: LLM_MODEL
        value: gpt-4o-mini
      - key: EMAIL_PROVIDER
        sync: false
      - key: EMAIL_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false

  - type: web
    name: rent-flatmate-finder-frontend
    runtime: node
    repo: https://github.com/anumodit740/rent-flatmate-finder.git
    branch: main
    rootDir: frontend
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm start -- -H 0.0.0.0 -p $PORT
    autoDeployTrigger: commit
    envVars:
      - key: NODE_VERSION
        value: 22.13.0
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: rent-flatmate-finder-backend
          envVarKey: RENDER_EXTERNAL_URL
      - key: NEXT_PUBLIC_SOCKET_URL
        fromService:
          type: web
          name: rent-flatmate-finder-backend
          envVarKey: RENDER_EXTERNAL_URL

databases:
  - name: rent-flatmate-finder-db
    plan: free
    databaseName: rent_flatmate_finder
    user: rent_flatmate_finder
