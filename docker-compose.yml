version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: rentfinder_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: rent_flatmate_finder
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rentfinder_backend
    restart: always
    depends_on:
      - postgres
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql://postgres:postgrespassword@postgres:5432/rent_flatmate_finder?schema=public
      PORT: 5000
      NODE_ENV: production
      CORS_ORIGIN: http://localhost:3000
      JWT_SECRET: super-secret-jwt-signing-key-minimum-32-characters
      JWT_REFRESH_SECRET: super-secret-jwt-refresh-signing-key-minimum-32-characters
      LLM_PROVIDER: openai
      LLM_API_KEY: ""
      HIGH_SCORE_THRESHOLD: 80
      EMAIL_PROVIDER: nodemailer
      SMTP_HOST: smtp.mailtrap.io
      SMTP_PORT: 2525
      SMTP_USER: ""
      SMTP_PASS: ""
      EMAIL_FROM: noreply@rentfinder.com

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rentfinder_frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000/api

volumes:
  pgdata:
